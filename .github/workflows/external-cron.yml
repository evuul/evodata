# External scheduler for Vercel-hosted cron endpoints.
name: External Cron

on:
  schedule:
    - cron: "*/5 * * * *"
    - cron: "*/15 * * * *"
    - cron: "30 * * * *"
    - cron: "0 16 * * *"
  workflow_dispatch:
    inputs:
      job:
        description: "Which cron job to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - casinoscores
          - ath-alerts
          - daily-avg
          - short

permissions:
  contents: read

concurrency:
  group: external-cron-${{ github.event.schedule || github.event.inputs.job || 'manual' }}
  cancel-in-progress: false

env:
  CRON_BASE_URL: ${{ vars.CRON_BASE_URL != '' && vars.CRON_BASE_URL || 'https://evodata.vercel.app' }}

jobs:
  casinoscores:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '*/5 * * * *') ||
      (github.event_name == 'workflow_dispatch' && (inputs.job == 'all' || inputs.job == 'casinoscores'))
    runs-on: ubuntu-latest
    steps:
      - name: Trigger casinoscores cron
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          response_file="$(mktemp)"
          status="$(curl -sS -o "$response_file" -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${CRON_BASE_URL}/api/casinoscores/cron")"
          cat "$response_file"
          test "$status" -ge 200
          test "$status" -lt 300

  ath-alerts:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '*/15 * * * *') ||
      (github.event_name == 'workflow_dispatch' && (inputs.job == 'all' || inputs.job == 'ath-alerts'))
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ATH alerts cron
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          response_file="$(mktemp)"
          status="$(curl -sS -o "$response_file" -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${CRON_BASE_URL}/api/alerts/ath")"
          cat "$response_file"
          test "$status" -ge 200
          test "$status" -lt 300

  daily-avg:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '30 * * * *') ||
      (github.event_name == 'workflow_dispatch' && (inputs.job == 'all' || inputs.job == 'daily-avg'))
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily average cron
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          response_file="$(mktemp)"
          status="$(curl -sS -o "$response_file" -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${CRON_BASE_URL}/api/alerts/daily-avg")"
          cat "$response_file"
          test "$status" -ge 200
          test "$status" -lt 300

  short:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 16 * * *') ||
      (github.event_name == 'workflow_dispatch' && (inputs.job == 'all' || inputs.job == 'short'))
    runs-on: ubuntu-latest
    steps:
      - name: Trigger short snapshot cron
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          response_file="$(mktemp)"
          status="$(curl -sS -o "$response_file" -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${CRON_BASE_URL}/api/short/cron")"
          cat "$response_file"
          test "$status" -ge 200
          test "$status" -lt 300
